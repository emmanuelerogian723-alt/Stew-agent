services:
  - type: web
    name: stew-agent
    runtime: docker
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: STEW_ADMIN_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
    healthCheckPath: /heartbeat
    autoDeploy: true
