[build]
builder = "DOCKERFILE"
dockerfilePath = "stew_deploy/Dockerfile"

[deploy]
startCommand = "alembic upgrade head && uvicorn server.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/heartbeat"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
