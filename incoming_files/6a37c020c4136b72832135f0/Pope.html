<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pope — STEW Agent Tester</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
body{background:#0a0a12;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 20px;text-align:center;border-bottom:2px solid #0f3460;}
header h1{font-size:1.5rem;color:#00ff88;}
header p{font-size:.8rem;color:#888;margin-top:4px;}
#status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.75rem;margin-top:8px;background:#1a1a2e;border:1px solid #333;}
#chat{flex:1;overflow-y:auto;padding:16px 20px;max-width:700px;width:100%;margin:0 auto;}
.msg{margin-bottom:14px;max-width:85%;padding:12px 16px;border-radius:16px;line-height:1.5;font-size:.9rem;white-space:pre-wrap;word-wrap:break-word;}
.msg.user{background:#0f3460;margin-left:auto;text-align:right;}
.msg.stew{background:#1a1a2e;border:1px solid #0f3460;}
.msg.stew strong{color:#00ff88;}
.msg small{display:block;margin-top:6px;font-size:.65rem;color:#666;}
.typing{color:#00ff88;font-style:italic;font-size:.85rem;padding:8px 0;}
#input-bar{background:#111;padding:12px 20px;border-top:2px solid #0f3460;display:flex;gap:10px;max-width:700px;width:100%;margin:0 auto;}
#msg-input{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:12px 16px;color:#e0e0e0;font-size:.9rem;outline:none;}
#msg-input:focus{border-color:#00ff88;}
#send-btn{background:#00ff88;color:#000;border:none;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer;font-size:.9rem;transition:.2s;}
#send-btn:hover{background:#00cc6a;}
#send-btn:disabled{background:#333;color:#666;cursor:not-allowed;}
.actions{text-align:center;padding:10px;background:#111;border-bottom:1px solid #1a1a2e;}
.actions button{background:#1a1a2e;color:#00ff88;border:1px solid #0f3460;border-radius:8px;padding:8px 14px;font-size:.75rem;cursor:pointer;margin:0 4px;transition:.2s;}
.actions button:hover{background:#0f3460;}
@media(max-width:600px){header h1{font-size:1.2rem;}.msg{max-width:95%;}}
</style>
</head>
<body>

<header>
  <h1>🤖 Pope</h1>
  <p>STEW Agent Tester — powered by stew-agent.onrender.com</p>
  <div id="status">⏳ Checking STEW status...</div>
</header>

<div class="actions">
  <button onclick="clearChat()">Clear Chat</button>
  <button onclick="testTask()">Test Task</button>
  <button onclick="testSearch()">Test Search</button>
</div>

<div id="chat"></div>

<div id="input-bar">
  <input id="msg-input" type="text" placeholder="Ask STEW anything..." onkeypress="if(event.key==='Enter')sendMsg()">
  <button id="send-btn" onclick="sendMsg()">Send</button>
</div>

<script>
const STEW_URL = 'https://stew-agent.onrender.com';
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');

// Check STEW status on load
async function checkStatus() {
  try {
    const res = await fetch(STEW_URL + '/heartbeat');
    if (res.ok) {
      const d = await res.json();
      statusEl.textContent = '🟢 STEW ONLINE — Beat #' + d.beat + ' • Energy: ' + d.energy + '%';
      statusEl.style.borderColor = '#00ff88';
      statusEl.style.color = '#00ff88';
      addMsg('stew', 'STEW is online and ready! 🤖\n\nI am STEW — Strategic Thinking Execution Workbench.\nAsk me anything and I will get it done.\n\nBuilt by MUTYINT 🇳🇬', 'STEW Agent');
    }
  } catch(e) {
    statusEl.textContent = '🔴 STEW OFFLINE — Check back in a moment';
    statusEl.style.borderColor = '#ff4444';
    statusEl.style.color = '#ff4444';
    addMsg('stew', 'STEW is currently offline or still waking up.\nRender free tier sleeps after 15 mins of inactivity.\nTry sending a message — it will wake up in ~30 seconds.', 'System');
  }
}

function addMsg(type, text, source) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const time = new Date().toLocaleTimeString('en-NG', {hour:'2-digit',minute:'2-digit'});
  if (source) {
    div.innerHTML = text.replace(/\n/g,'<br>') + '<small>' + source + ' • ' + time + '</small>';
  } else {
    div.innerHTML = text.replace(/\n/g,'<br>') + '<small>' + time + '</small>';
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg stew';
  div.id = 'typing-indicator';
  div.innerHTML = '<span class="typing">STEW is thinking...</span>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMsg() {
  const msg = inputEl.value.trim();
  if (!msg) return;
  inputEl.value = '';
  sendBtn.disabled = true;
  addMsg('user', msg, 'You');
  showTyping();

  try {
    const res = await fetch(STEW_URL + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    hideTyping();
    if (res.ok) {
      const data = await res.json();
      addMsg('stew', data.response || data.message || 'No response', 'STEW Agent');
    } else {
      addMsg('stew', 'Error: STEW returned status ' + res.status, 'Error');
    }
  } catch(e) {
    hideTyping();
    addMsg('stew', 'Could not reach STEW. The server might be sleeping.\nTry again in a few seconds.\n\nError: ' + e.message, 'Connection');
  }
  sendBtn.disabled = false;
  inputEl.focus();
}

async function testTask() {
  addMsg('user', 'Test Task: Write a Python hello world program', 'Test');
  showTyping();
  try {
    const res = await fetch(STEW_URL + '/task', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task: 'Write a Python hello world program'})
    });
    hideTyping();
    if (res.ok) {
      const data = await res.json();
      addMsg('stew', data.result || data.response || JSON.stringify(data), 'STEW Task');
    } else {
      addMsg('stew', 'Task failed: ' + res.status, 'Error');
    }
  } catch(e) {
    hideTyping();
    addMsg('stew', 'Connection error: ' + e.message, 'Error');
  }
}

async function testSearch() {
  addMsg('user', 'Test Search: best universities in Nigeria', 'Test');
  showTyping();
  try {
    const res = await fetch(STEW_URL + '/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: 'best universities in Nigeria'})
    });
    hideTyping();
    if (res.ok) {
      const data = await res.json();
      addMsg('stew', data.results || data.response || JSON.stringify(data, null, 2), 'STEW Search');
    } else {
      addMsg('stew', 'Search failed: ' + res.status, 'Error');
    }
  } catch(e) {
    hideTyping();
    addMsg('stew', 'Connection error: ' + e.message, 'Error');
  }
}

function clearChat() {
  chatEl.innerHTML = '';
  checkStatus();
}

checkStatus();
</script>
</body>
</html>
